name: Build C-at Editor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Tauri CLI v2
      run: cargo install tauri-cli@^2.0.0
    
    - name: Build
      run: |
        cd src-tauri
        cargo tauri build
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: C-at-Editor-Windows
        path: src-tauri/target/release/cat-editor.exe
